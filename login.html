<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipass AI — Sign In</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="login-page">

  <div class="bg-dots" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <div class="login-wrap">

    <!-- Left branding panel -->
    <div class="login-brand">
      <a class="login-brand-logo" href="index.html">BIPASS AI</a>
      <div class="login-brand-body">
        <p class="login-brand-headline">Your AI text,<br>made undetectable.</p>
        <ul class="login-brand-list">
          <li>Bypasses every major AI detector</li>
          <li>3 humanization levels</li>
          <li>Results in under 10 seconds</li>
          <li>100% undetectable output</li>
        </ul>
      </div>
      <p class="login-brand-foot">Powered by Gemini 2.5 Flash</p>
    </div>

    <!-- Right auth panel -->
    <div class="login-panel">
      <div class="login-card">

        <div class="login-head">
          <h1 class="login-title" id="login-title">Welcome back</h1>
          <p class="login-sub" id="login-sub">Sign in to continue to Bipass AI</p>
        </div>

        <!-- Google — primary action -->
        <button class="login-google-btn" id="google-btn" type="button">
          <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="login-divider"><span>or use email</span></div>

        <!-- Alerts -->
        <div class="login-error hidden" id="login-error" role="alert"></div>
        <div class="login-success hidden" id="login-success" role="status"></div>

        <!-- First name (sign-up only) -->
        <div class="login-field hidden" id="name-field">
          <label class="login-label" for="name-input">First name</label>
          <input class="login-input" id="name-input" type="text" placeholder="Your first name" autocomplete="given-name">
        </div>

        <!-- Email -->
        <div class="login-field">
          <label class="login-label" for="email-input">Email</label>
          <input class="login-input" id="email-input" type="email" placeholder="you@example.com" autocomplete="email" required>
        </div>

        <!-- Password -->
        <div class="login-field">
          <label class="login-label" for="password-input">Password</label>
          <input class="login-input" id="password-input" type="password" placeholder="••••••••" autocomplete="current-password" required>
        </div>

        <!-- Submit -->
        <button class="login-btn" id="submit-btn" type="button">
          <span class="login-btn-label">Sign In</span>
          <span class="login-btn-sweep" aria-hidden="true"></span>
        </button>

        <!-- Toggle sign-in / sign-up -->
        <p class="login-toggle">
          Don't have an account?
          <button class="login-toggle-btn" id="toggle-mode-btn">Create one</button>
        </p>

      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="login.js"></script>
  <script src="cursor.js"></script>
</body>
</html>
