<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipass AI — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="apple-touch-icon" href="favicon.png">
  <link rel="stylesheet" href="style.css?v=3">
</head>
<body class="editor-page">

  <div class="bg-dots" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <a class="nav-logo" href="app.html">BIPASS AI</a>
      <div class="nav-links">
        <a class="nav-link" href="app.html">Home</a>
        <a class="nav-link" href="plans.html">Plans</a>
        <a class="nav-link" href="howto.html">How to Use</a>
        <a class="nav-link" href="settings.html">Settings</a>
      </div>
      <div class="nav-user" id="nav-user"></div>
    </div>
  </nav>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer" aria-label="Navigation menu">
    <div class="drawer-head">
      <span class="drawer-brand">BIPASS AI</span>
      <button class="drawer-close" id="drawer-close" aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="drawer-user" id="drawer-user"></div>
    <div class="drawer-plan" id="drawer-plan"></div>
    <nav class="drawer-nav">
      <a class="drawer-item" href="app.html">Home</a>
      <a class="drawer-item" href="history.html">History</a>
      <a class="drawer-item" href="plans.html">Plans</a>
      <a class="drawer-item" href="howto.html">How to Use</a>
      <a class="drawer-item" href="settings.html">Settings</a>
    </nav>
    <div class="drawer-footer">
      <button class="drawer-signout-btn" id="drawer-signout-btn">Sign out</button>
    </div>
  </aside>

  <main class="history-main">
    <div class="history-wrap">
      <div class="history-head">
        <h1 class="history-title">Your History</h1>
        <p class="history-sub" id="history-sub">Loading…</p>
      </div>
      <div class="history-controls" id="history-controls" style="display:none">
        <div class="history-search-wrap">
          <svg class="history-search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input class="history-search-input" id="history-search" type="text" placeholder="Search your history…" autocomplete="off" spellcheck="false">
          <button class="history-search-clear hidden" id="history-search-clear" aria-label="Clear search">
            <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
          </button>
        </div>
        <div class="history-mode-pills">
          <button class="history-mode-btn active" data-mode="">All</button>
          <button class="history-mode-btn" data-mode="generate">Generated</button>
          <button class="history-mode-btn" data-mode="humanize">Humanized</button>
        </div>
      </div>

      <div class="history-list" id="history-list"></div>
      <div class="history-empty-search hidden" id="history-empty-search">No results match your search.</div>
    </div>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js?v=2"></script>
  <script src="history.js?v=2"></script>
  <script src="cursor.js?v=2"></script>

  <footer class="site-footer">
    <span>© 2026 Bipass AI</span>
    <span class="site-footer-sep">·</span>
    <a href="privacy.html">Privacy Policy</a>
  </footer>
</body>
</html>
