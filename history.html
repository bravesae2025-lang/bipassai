<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipass AI — History</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body class="editor-page">

  <div class="bg-dots" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <nav class="navbar">
    <div class="nav-inner">
      <a class="nav-logo" href="app.html">BIPASS AI</a>
      <div class="nav-links">
        <a class="nav-link" href="app.html">New Text</a>
      </div>
      <div class="nav-user" id="nav-user"></div>
    </div>
  </nav>

  <main class="history-main">
    <div class="history-wrap">
      <div class="history-head">
        <h1 class="history-title">Your History</h1>
        <p class="history-sub" id="history-sub">Loading…</p>
      </div>
      <div class="history-list" id="history-list"></div>
    </div>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="history.js"></script>
</body>
</html>
