<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bipass AI — Result</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Syne:wght@400;500;600;700;800&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
  <link rel="icon" type="image/png" sizes="48x48" href="/favicon.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/favicon.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="stylesheet" href="style.css?v=10">
</head>
<body class="editor-page">

  <div class="bg-dots" aria-hidden="true"></div>
  <div class="grain" aria-hidden="true"></div>

  <!-- Loading overlay for "Edit with AI" -->
  <div class="loading-overlay" id="loading-overlay" aria-live="polite">
    <div class="loading-spinner"></div>
    <div class="loading-text" id="loading-text">Editing with AI…</div>
  </div>

  <nav class="navbar">
    <div class="nav-inner">
      <button class="nav-hamburger" id="nav-hamburger" aria-label="Open menu">
        <span></span><span></span><span></span>
      </button>
      <a class="nav-logo" href="/home">BIPASS AI</a>
      <div class="nav-links"></div>
      <div class="nav-user" id="nav-user"></div>
    </div>
  </nav>

  <div class="drawer-overlay" id="drawer-overlay"></div>
  <aside class="drawer" id="drawer" aria-label="Navigation menu">
    <div class="drawer-head">
      <span class="drawer-brand">BIPASS AI</span>
      <button class="drawer-close" id="drawer-close" aria-label="Close menu">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="drawer-user" id="drawer-user"></div>
    <nav class="drawer-nav">
      <a class="drawer-item" href="/home">New Text</a>
      <a class="drawer-item" href="history.html">History</a>
      <a class="drawer-item" href="plans.html">Plans</a>
      <a class="drawer-item" href="howto.html">How to Use</a>
      <a class="drawer-item" href="settings.html">Settings</a>
    </nav>
    <div class="drawer-footer">
      <button class="drawer-signout-btn" id="drawer-signout-btn">Sign out</button>
    </div>
  </aside>

  <main class="editor-main">
    <div class="editor-wrap">

      <div class="editor-topbar">
        <div class="editor-meta">
          <span class="editor-badge" id="editor-badge">Result</span>
          <span class="editor-wc" id="editor-wc">0 words</span>
          <span class="editor-tokens hidden" id="editor-tokens"></span>
          <span class="editor-change-count hidden" id="editor-change-count"></span>
          <span class="editor-score hidden" id="editor-score"></span>
        </div>
        <div class="editor-view-toggle hidden" id="editor-view-toggle">
          <button class="view-toggle-btn active" id="toggle-result">Result</button>
          <button class="view-toggle-btn" id="toggle-original">Original</button>
          <button class="view-toggle-btn view-toggle-btn--changes" id="toggle-changes">Changes</button>
        </div>
        <button class="editor-copy-btn" id="copy-btn">Copy</button>
      </div>

      <textarea
        class="editor-textarea"
        id="editor-textarea"
        spellcheck="false"
        placeholder="Your result will appear here…"
      ></textarea>
      <div class="changes-filter hidden" id="changes-filter">
        <span class="changes-filter-title">Show changes:</span>
        <label class="cf-chip" data-cat="word"><input type="checkbox" checked><span class="cf-dot"></span>Vocabulary</label>
        <label class="cf-chip" data-cat="caps"><input type="checkbox" checked><span class="cf-dot"></span>Capitals</label>
        <label class="cf-chip" data-cat="punct"><input type="checkbox" checked><span class="cf-dot"></span>Punctuation</label>
        <label class="cf-chip" data-cat="spelling"><input type="checkbox" checked><span class="cf-dot"></span>Spelling</label>
        <label class="cf-chip" data-cat="tense"><input type="checkbox" checked><span class="cf-dot"></span>Tense</label>
        <label class="cf-chip" data-cat="grammar"><input type="checkbox" checked><span class="cf-dot"></span>Grammar</label>
      </div>
      <div class="changes-view hidden" id="changes-view"></div>

      <!-- Feature badges -->
      <div class="editor-badges" id="editor-badges"></div>

      <!-- AI edit prompt box -->
      <div class="ai-prompt-box" id="ai-prompt-box">
        <div class="ai-prompt-label">Edit with AI</div>
        <textarea
          class="ai-prompt-input"
          id="ai-prompt-input"
          placeholder="Tell the AI what to change… e.g. 'make it sound more casual' or 'shorten it by half'"
          spellcheck="false"
          rows="2"
        ></textarea>
        <div class="ai-prompt-actions">
          <button class="ai-prompt-apply" id="ai-prompt-apply">
            Apply
            <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"/></svg>
          </button>
        </div>
      </div>

      <div class="editor-actions">
        <a href="/home" class="editor-btn editor-btn-back">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
          Back
        </a>
        <button class="editor-btn editor-btn-push" id="push-ext-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.5 11H19V7a2 2 0 0 0-2-2h-4V3.5A2.5 2.5 0 0 0 10.5 1 2.5 2.5 0 0 0 8 3.5V5H4a2 2 0 0 0-2 2v3.8h1.5a2.5 2.5 0 0 1 0 5H2V20a2 2 0 0 0 2 2h3.8v-1.5a2.5 2.5 0 0 1 5 0V22H17a2 2 0 0 0 2-2v-4h1.5a2.5 2.5 0 0 0 0-5z"/></svg>
          Upload to Extension
        </button>
        <button class="editor-btn editor-btn-regen" id="regen-btn">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6"/><path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/></svg>
          Regenerate
        </button>
      </div>

    </div>
  </main>

  <div id="toast" class="toast hidden" role="status" aria-live="polite"></div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
  <script src="auth.js"></script>
  <script src="editor.js?v=2"></script>
  <script src="cursor.js"></script>
</body>
</html>
